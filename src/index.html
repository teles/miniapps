<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microapps</title>
  </head>
  <body class="launcher-body">
    <main class="launcher-shell">
      <header class="launcher-header">
        <h1 class="launcher-title">Microapps Desktop</h1>
        <p class="launcher-subtitle">Escolha um microapp para abrir.</p>
      </header>

      <section class="launcher-grid">
        <a
          class="launcher-tile ds-tooltip"
          data-tooltip="Open Daily Pomodoro"
          href="/microapps/pomodoros/">
          <span class="launcher-tile-icon">🍅</span>
          <span class="launcher-tile-title">Daily Pomodoro</span>
          <span class="launcher-tile-caption">Focus timer with tabs</span>
        </a>

        <a
          class="launcher-tile ds-tooltip"
          data-tooltip="Open Emoji Remover"
          href="/microapps/emoji-remover/">
          <span class="launcher-tile-icon">🧹</span>
          <span class="launcher-tile-title">Emoji Remover</span>
          <span class="launcher-tile-caption">Clean emojis from any text</span>
        </a>

        <div
          class="launcher-tile ds-tooltip"
          data-tooltip="Coming soon"
          aria-disabled="true">
          <span class="launcher-tile-icon">🎨</span>
          <span class="launcher-tile-title">Color Compare</span>
          <span class="launcher-tile-caption">Planned microapp</span>
        </div>
      </section>
    </main>
    <script type="module" src="/launcher/main.js"></script>
  </body>
</html>
